<!DOCTYPE html>
<html>
<head>
  <title>For My Bestie 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, pink, lightblue);
      color: white;
    }
    h1 {
      margin-top: 100px;
      font-size: 40px;
    }
    p {
      font-size: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: white;
      color: pink;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Hey Bestie 💖</h1>
  <p>You are the most amazing person in my life 🥺</p>

  <button onclick="showMessage()">Click Me 💌</button>

  <script>
    function showMessage() {
      alert("I’m so lucky to have you as my best friend 💕");
    }
  </script>

</body>
</html>
